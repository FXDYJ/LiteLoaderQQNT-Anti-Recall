name: Build Plugin

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win32
            arch: x64
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: macos-latest
            platform: darwin
            arch: arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install production dependencies
        run: npm install --omit=dev

      - name: Package plugin
        shell: bash
        run: |
          mkdir -p dist/anti_recall
          cp *.js dist/anti_recall/
          cp manifest.json package.json icon.png LICENSE README.md dist/anti_recall/
          cp -r node_modules dist/anti_recall/

      - name: Create archive (Unix)
        if: runner.os != 'Windows'
        run: cd dist && zip -r ../qq-anti-recall-${{ matrix.platform }}-${{ matrix.arch }}.zip anti_recall

      - name: Create archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist\anti_recall -DestinationPath qq-anti-recall-${{ matrix.platform }}-${{ matrix.arch }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qq-anti-recall-${{ matrix.platform }}-${{ matrix.arch }}
          path: qq-anti-recall-${{ matrix.platform }}-${{ matrix.arch }}.zip
