name: Build Plugin

on:
  workflow_dispatch:
    inputs:
      electron_version:
        description: 'Electron version for native module rebuild (should match QQNT Electron version)'
        required: false
        default: '31.2.1'

permissions:
  contents: read

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win32
            arch: x64
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: macos-14
            platform: darwin
            arch: x64
          - os: macos-latest
            platform: darwin
            arch: arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install production dependencies
        run: npm install --omit=dev
        env:
          npm_config_arch: ${{ matrix.arch }}

      - name: Rebuild native modules for Electron
        run: npx @electron/rebuild -w better-sqlite3 -v ${{ inputs.electron_version || '31.2.1' }} --arch=${{ matrix.arch }}

      - name: Package plugin
        shell: bash
        run: |
          mkdir -p dist/anti_recall
          cp main.js preload.js renderer.js database.js imgDownloader.js rkeyManager.js dist/anti_recall/
          cp manifest.json package.json icon.png LICENSE README.md dist/anti_recall/
          cp -r node_modules dist/anti_recall/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qq-anti-recall-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/anti_recall
